name: Update Sandra Special

on:
  schedule:
    - cron: '59 1 31 3 *'
    - cron: '59 3 31 3 *'
    - cron: '30 1 4 4 *'
    - cron: '59 3 4 4 *'
    - cron: '30 1 5 4 *'
    - cron: '59 3 5 4 *'
    - cron: '45 22 5 4 *'
    - cron: '59 3 7 4 *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python update_combined.py
      - name: Commit updated index.html
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update schedule"
          git push
      - name: Trigger Netlify deploy
        run: curl -X POST ${{ secrets.NETLIFY_HOOK_MAIN }}
